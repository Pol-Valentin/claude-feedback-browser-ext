<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peekback</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <h1>Peekback</h1>
      <span id="connection-indicator" class="indicator disconnected" title="Disconnected"></span>
    </div>
    <div class="header-right">
      <label class="highlight-toggle" title="Toggle remote highlights">
        <span class="toggle-label">Highlights</span>
        <input type="checkbox" id="highlight-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </header>

  <!-- Channel selector -->
  <div id="session-selector">
    <div class="session-header">
      <span class="session-title">Channels</span>
      <button id="btn-refresh-channels" class="icon-btn" title="Refresh channels list">↻</button>
    </div>
    <div id="session-list"></div>
    <div id="no-sessions">
      <span>No channels connected</span>
    </div>
  </div>

  <!-- Chat thread -->
  <div id="chat-thread">
    <div id="chat-empty">
      <p>Select an element or take a screenshot to send feedback to Claude.</p>
    </div>
    <div id="chat-messages"></div>
  </div>

  <!-- Unified Composer -->
  <div id="composer">
    <!-- Element chip (shown when element captured) -->
    <div id="chip-element" class="chip hidden">
      <div class="chip-content">
        <span class="chip-icon">🔍</span>
        <span id="chip-element-label" class="chip-label"></span>
      </div>
      <button id="chip-element-remove" class="chip-remove" title="Remove element">✕</button>
    </div>

    <!-- Screenshot chip (shown when screenshot captured) -->
    <div id="chip-screenshot" class="chip hidden">
      <img id="chip-screenshot-img" class="chip-thumb" alt="Screenshot">
      <button id="chip-screenshot-remove" class="chip-remove" title="Remove screenshot">✕</button>
    </div>

    <!-- Single textarea -->
    <textarea id="composer-input" placeholder="Send a message to Claude..." rows="1" disabled></textarea>

    <!-- Action bar -->
    <div id="composer-actions">
      <button id="btn-element" class="capture-btn" disabled title="Select a page element">
        <span class="capture-btn-icon">🔍</span>
        <span class="capture-btn-label">Element</span>
      </button>
      <button id="btn-screenshot" class="capture-btn" disabled title="Capture a screenshot region">
        <span class="capture-btn-icon">📸</span>
        <span class="capture-btn-label">Screenshot</span>
      </button>
      <button id="btn-send" class="send-btn" disabled title="Send feedback">
        <span>↑</span>
      </button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
