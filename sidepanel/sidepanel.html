<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peekback</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-left">
      <h1>Peekback</h1>
      <span id="connection-indicator" class="indicator disconnected" title="Disconnected"></span>
    </div>
    <div class="header-right">
      <label class="highlight-toggle" title="Toggle remote highlights">
        <span class="toggle-label">Highlights</span>
        <input type="checkbox" id="highlight-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </header>

  <!-- Actions -->
  <div id="actions">
    <button id="btn-inspect" class="action-btn" disabled>
      <span class="btn-icon">🔍</span>
      <span>Inspect</span>
    </button>
    <button id="btn-screenshot" class="action-btn" disabled>
      <span class="btn-icon">📸</span>
      <span>Screenshot</span>
    </button>
  </div>

  <!-- Element preview (shown after selection) -->
  <div id="element-preview" class="hidden">
    <div class="preview-header">
      <span class="preview-title">Selected element</span>
      <button id="preview-close" class="icon-btn" title="Clear selection">✕</button>
    </div>
    <div id="preview-content"></div>
  </div>

  <!-- Screenshot preview -->
  <div id="screenshot-preview" class="hidden">
    <div class="preview-header">
      <span class="preview-title">Screenshot</span>
      <button id="screenshot-close" class="icon-btn" title="Clear">✕</button>
    </div>
    <img id="screenshot-img" alt="Screenshot preview">
  </div>

  <!-- Comment input -->
  <div id="comment-area" class="hidden">
    <textarea id="comment-input" placeholder="Describe your feedback..." rows="3"></textarea>
    <div class="comment-actions">
      <button id="btn-send" class="primary-btn">Send</button>
      <button id="btn-cancel" class="secondary-btn">Cancel</button>
    </div>
  </div>

  <!-- Channel selector -->
  <div id="session-selector">
    <div class="session-header">
      <span class="session-title">Channels</span>
      <button id="btn-refresh-channels" class="icon-btn" title="Refresh channels list">↻</button>
    </div>
    <div id="session-list"></div>
    <div id="no-sessions">
      <span>No channels connected</span>
    </div>
  </div>

  <!-- Chat thread -->
  <div id="chat-thread">
    <div id="chat-empty">
      <p>👋 Select an element or take a screenshot to send feedback to Claude.</p>
    </div>
    <div id="chat-messages"></div>
  </div>

  <!-- Free message input (always visible at bottom) -->
  <div id="message-bar">
    <textarea id="message-input" placeholder="Send a message to Claude..." rows="1" disabled></textarea>
    <button id="btn-message-send" class="primary-btn" disabled>↑</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
