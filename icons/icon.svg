<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111114"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Outer ring (aperture/lens) -->
  <circle cx="64" cy="58" r="34" fill="none" stroke="#BFFF00" stroke-width="3.5" opacity="0.35"/>

  <!-- Inner ring -->
  <circle cx="64" cy="58" r="22" fill="none" stroke="#BFFF00" stroke-width="2.5" opacity="0.6"/>

  <!-- Center dot (the "peek" eye) -->
  <circle cx="64" cy="58" r="8" fill="#BFFF00"/>

  <!-- Feedback arrow (curved, pointing back) -->
  <path d="M 48 90 Q 36 82, 36 72" fill="none" stroke="#BFFF00" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <polygon points="33,74 39,68 42,76" fill="#BFFF00" opacity="0.8"/>

  <!-- Small forward arrow (send) -->
  <path d="M 80 90 Q 92 82, 92 72" fill="none" stroke="#BFFF00" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <polygon points="95,74 89,68 86,76" fill="#BFFF00" opacity="0.4"/>
</svg>
