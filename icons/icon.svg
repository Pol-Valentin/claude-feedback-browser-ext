<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111114"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="18" fill="url(#bg)"/>

  <!-- Outer ring (aperture/lens) -->
  <circle cx="64" cy="58" r="44" fill="none" stroke="#BFFF00" stroke-width="3.5" opacity="0.3"/>

  <!-- Inner ring -->
  <circle cx="64" cy="58" r="28" fill="none" stroke="#BFFF00" stroke-width="3" opacity="0.55"/>

  <!-- Center dot (the "peek" eye) -->
  <circle cx="64" cy="58" r="10" fill="#BFFF00"/>

  <!-- Feedback arrow (curved, pointing back) -->
  <path d="M 44 100 Q 28 90, 28 76" fill="none" stroke="#BFFF00" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
  <polygon points="24,78 32,71 35,81" fill="#BFFF00" opacity="0.75"/>

  <!-- Small forward arrow (send) -->
  <path d="M 84 100 Q 100 90, 100 76" fill="none" stroke="#BFFF00" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <polygon points="104,78 96,71 93,81" fill="#BFFF00" opacity="0.35"/>
</svg>
